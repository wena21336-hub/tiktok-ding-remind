name: TikTok投放提醒
on:
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00 日报
    - cron: '30 18 * * *'# 北京时间 02:30 英国提醒
    - cron: '30 19 * * *'# 北京时间 03:30 欧洲5国提醒
    - cron: '30 22 * * *'# 北京时间 06:30 墨西哥提醒
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: pip install requests python-dateutil
      - name: 执行脚本
        run: python remind.py ${{ github.event.schedule }}
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
